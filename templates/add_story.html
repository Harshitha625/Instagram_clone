{% extends 'base.html' %}

{% block content %}

<div style="display:flex;justify-content:center;align-items:center;min-height:80vh;margin:auto;">
    <div style="width:350px;padding:25px;border-radius:12px;border:1px solid #333;">
        <a href="javascript:history.back()" style="text-decoration:none;color:white;font-size:18px;">
            ← Back
        </a>
        <form method="POST" enctype="multipart/form-data" style="color:white;margin-top:30px;">
            {% csrf_token %}
            <div style="margin-bottom:20px;">
                {{ form.as_p }}
            </div>
            <button
                type="submit"
                style="width:100%;padding:10px;background:#0095f6;color:white;border:none;border-radius:8px;font-size:15px;cursor:pointer;">
                Upload Story
            </button>
        </form>
    </div>
</div>
{% endblock %}
