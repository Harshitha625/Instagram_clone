<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
</head>
<body style="background-color: black;display:flex;justify-content:center;align-items:center;height:100vh;">
    <div style="width:500px; display:flex;align-items:center; flex-direction:column;gap:20px; margin:auto; margin-top:100px; padding:40px;background-color:rgba(255, 255, 255, 0.2);color:white; border-radius:10px;border:1px solid rgba(255, 255, 255, 0.3);backdrop-filter:blur(10px);">
        {% load crispy_forms_tags %}
        {{form.errors}}
        <form action="{% url 'login' %}" method="post">
        {% csrf_token %}
        {{ form | crispy }}
        <button type="submit" name='login' style="margin-top: 10px;padding:5px 10px;">Login</button>
        <a href="{% url 'register' %}">Register</a>
    </form>
    </div> 
</body>
</html>
