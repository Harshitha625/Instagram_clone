{% extends 'base.html' %}


{% block content %}

<div style="margin:5% auto;">
    <div >
        <form method="GET">
            <input type="text" name="q" placeholder="search" value="{{ keyword }}" style="padding: 15px;width:250px;border-radius:10px;">
            <button style="padding: 15px;border-radius: 10px;"><i class="fa-solid fa-search"></i></button>
        </form>
    </div>
    <div style="width:400px;display:flex;flex-direction:column;justify-content:flex-start">
        {% for user in users %}
            <div style="padding:15px;margin-top:10px;">
                <div>
                    <a href="{% url 'profilepage' user.username %}" style="display: flex;gap:20px;align-items:center;">
                        <img src="{{ user.profile.pfp.url }}" alt="" width="50px" height="50px" style="border-radius: 50%;">
                        <p style="font-size: 1.2rem;">{{ user.username }}</p>
                    </a>
                </div>
            </div>
        {% endfor %}
    </div>
</div>

{% endblock %}
