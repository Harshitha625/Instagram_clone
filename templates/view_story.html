{% extends 'base.html' %}

{% block content %}
<div style="display:flex;justify-content:center;align-items:center;height:90vh;margin:auto;">

    <div style="width:350px;padding-top:30px;">
        <a href="javascript:history.back()"><i class="fa-solid fa-arrow-left"></i></a>
        <!-- only show delte button to story user -->
        {% if story_user == request.user and stories %}
        <a href="{% url 'delete_story' stories.first.id %}" style="float: inline-end;"><i class="fa-solid fa-trash"></i></a>
        {% endif %}
        <!-- Progress Bar -->
        <div style="width:100%;height:3px;background:#444;border-radius:10px;margin-bottom:10px;">
            <div id="progress"
                 style="width:0%;height:100%;background:white;border-radius:10px;"></div>
        </div>

        <!-- User -->
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
            <img src="{{ story_user.profile.pfp.url }}"
                 width="35"
                 height="35"
                 style="border-radius:50%;object-fit:cover;">
            <strong>{{ story_user.username }}</strong>
        </div>

        <!-- Story -->
        <img id="story-image"
             src="{{ stories.0.image.url }}"
             style="width:350px;height:550px;object-fit:cover;border-radius:10px;">

    </div>
</div>

<script>
const stories = [
    {% for story in stories %}
        "{{ story.image.url }}",
    {% endfor %}
];
</script>

<script>
let index = 0;
const img = document.getElementById("story-image");
const progress = document.getElementById("progress");
function showStory() {
    img.src = stories[index];
    progress.style.transition = "none";
    progress.style.width = "0%";
    setTimeout(() => {
        progress.style.transition = "width 5s linear";
        progress.style.width = "100%";
    }, 50);
    setTimeout(() => {
        index++;
        if(index < stories.length){
            showStory();
        }else{
            window.location.href = "/";
        }
    },5000);
}
showStory();
</script>

{% endblock %}
