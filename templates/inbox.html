{% extends 'base.html' %}

{% block content %}

<div style="width:500px;margin:30px auto;background:#111;border:1px solid #333;border-radius:10px;overflow:hidden;">
    <div style="padding:15px;border-bottom:1px solid #333;font-size:22px;font-weight:bold;">
        <a href="javascript:history.back()"><i class="fa-solid fa-arrow-left"></i></a>
        Messages
    </div>
    {% for convo in conversations %}
        {% for user in convo.participants.all %}
            {% if user != request.user %}
            <a href="{% url 'chat' convo.id %}" style="text-decoration:none;color:white;">
                <div style="display:flex;align-items:center;gap:15px;padding:15px;border-bottom:1px solid #222;">
                    <img src="{{ user.profile.pfp.url }}"
                         style="width:50px;height:50px;border-radius:50%;object-fit:cover;">
                    <div>
                        <h3 style="margin:0;font-size:16px;">{{ user.username }}</h3>
                        <p style="margin:4px 0 0;color:gray;font-size:13px;">
                            Tap to chat
                        </p>
                    </div>
                </div>
            </a>
            {% endif %}
        {% endfor %}
    {% empty %}
        <p style="padding:20px;text-align:center;color:gray;">
            No conversations yet.
        </p>
    {% endfor %}
</div>
{% endblock %}
