{% extends 'base.html' %}

{% block content %}

{% load crispy_forms_tags %}

<div style="width:100%;display:flex;justify-content:center;align-items:center;flex-direction:column;padding:40px 0;">

    <a href="{% url 'profilepage' request.user.username %}"
       style="width:500px;margin-bottom:20px;font-size:22px;color:white;text-decoration:none;">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <div style="width:500px;background:#111;border:1px solid #333;border-radius:12px;padding:30px;box-sizing:border-box;">

        <h2 style="text-align:center;margin-bottom:25px;color:white;">
            Edit Profile
        </h2>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            {{ form|crispy }}

            <button
                type="submit"
                style="
                    width:100%;
                    margin-top:20px;
                    padding:12px;
                    background:#0095f6;
                    color:white;
                    border:none;
                    border-radius:8px;
                    font-size:16px;
                    font-weight:bold;
                    cursor:pointer;">
                Save Changes
            </button>

        </form>

    </div>

</div>

{% endblock %}
